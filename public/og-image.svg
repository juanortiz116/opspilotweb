<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#111a23"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39ce86"/>
      <stop offset="100%" stop-color="#1b998b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39ce86"/>
      <stop offset="100%" stop-color="#1b998b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1b998b" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1b998b" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1b998b" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1b998b" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Glow orb left -->
  <circle cx="120" cy="315" r="200" fill="#39ce86" fill-opacity="0.04"/>
  <!-- Glow orb right -->
  <circle cx="1100" cy="200" r="250" fill="#1b998b" fill-opacity="0.05"/>

  <!-- Logo mark -->
  <g transform="translate(96, 251)">
    <circle cx="32" cy="32" r="32" fill="#111a23"/>
    <circle cx="32" cy="32" r="18" stroke="url(#logoGrad)" stroke-width="6" fill="none"/>
    <circle cx="32" cy="14" r="4" fill="#39ce86"/>
  </g>

  <!-- Brand name -->
  <text x="172" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)">OpsPilot</text>

  <!-- Tagline -->
  <text x="96" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8899aa">Gestiona tu negocio como las grandes empresas</text>

  <!-- Divider -->
  <line x1="96" y1="380" x2="600" y2="380" stroke="#1b998b" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Features row -->
  <text x="96" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#39ce86">ERP</text>
  <text x="144" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#445566">·</text>
  <text x="158" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#39ce86">CRM</text>
  <text x="210" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#445566">·</text>
  <text x="224" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#39ce86">Presupuestador</text>
  <text x="366" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#445566">·</text>
  <text x="380" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#39ce86">Software a medida</text>

  <!-- Domain -->
  <text x="96" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#445566">opspilot.es</text>

  <!-- Right side card -->
  <rect x="780" y="165" width="324" height="300" rx="16" fill="#0f1c28" stroke="#1b998b" stroke-opacity="0.15" stroke-width="1"/>
  <text x="942" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#39ce86" text-anchor="middle" letter-spacing="2">PARA PYMES EN ESPAÑA</text>
  <text x="942" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Desde</text>
  <text x="942" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" text-anchor="middle">29€/mes</text>
  <text x="942" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#667788" text-anchor="middle">Sin permanencia · Sin sorpresas</text>
  <rect x="850" y="400" width="184" height="44" rx="8" fill="#39ce86"/>
  <text x="942" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1b2a" text-anchor="middle">Diagnóstico gratuito</text>
</svg>
