<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#111a23"/>
  <!-- Letter O shape (stylised ring) -->
  <circle cx="32" cy="32" r="18" stroke="url(#grad)" stroke-width="6" fill="none"/>
  <!-- Accent dot (pilot indicator) -->
  <circle cx="32" cy="14" r="4" fill="#39ce86"/>
  <defs>
    <linearGradient id="grad" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39ce86"/>
      <stop offset="100%" stop-color="#1b998b"/>
    </linearGradient>
  </defs>
</svg>
