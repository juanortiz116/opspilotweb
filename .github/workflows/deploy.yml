name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: Opspilots/agenciaopspilot/.github/workflows/deploy-vps.yml@master
    with:
      project_name: opspilotweb
      # No test script — opspilotweb has no test suite yet
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
